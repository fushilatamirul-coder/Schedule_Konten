<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawon Mbah Gito · Divisi Konten</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 10% 20%, #fdf0e3 0%, #f5dccb 100%);
        }

        .card {
            max-width: 1440px;
            width: 100%;
            background: rgba(255, 248, 240, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.8rem;
            box-shadow: 0 40px 70px rgba(100, 60, 30, 0.25);
            border: 1px solid rgba(255, 225, 200, 0.4);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            background: linear-gradient(135deg, #fbeee2 0%, #f6e0cd 100%);
            padding: 0.6rem 2rem;
            border-radius: 100px;
            border: 1px solid #ebd0ba;
            box-shadow: 0 6px 20px rgba(150, 90, 50, 0.12);
        }

        .header-left h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #5a3421, #2f1b10);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left small {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #7a543b;
            background: rgba(235, 205, 185, 0.5);
            padding: 0.15rem 1.2rem;
            border-radius: 40px;
            margin-top: 4px;
            border: 1px solid #e6ceb9;
        }

        .header-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(80, 50, 25, 0.08);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        .btn-save {
            background: linear-gradient(135deg, #3e7a5c, #2b5c43);
            color: white;
        }
        .btn-save:hover { box-shadow: 0 8px 20px rgba(40, 90, 60, 0.35); }

        .btn-image {
            background: linear-gradient(135deg, #2980b9, #1a5276);
            color: white;
        }
        .btn-image:hover { box-shadow: 0 8px 20px rgba(40, 80, 150, 0.35); }
        .btn-image i { color: #aed6f1; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 32px;
            background: linear-gradient(145deg, #f5e8da, #ecdac9);
            padding: 0.4rem;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.9rem;
            min-width: 920px;
            background: #fffbf5;
            border-radius: 28px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(145deg, #d9b99b, #c9a384);
            color: #281b10;
            font-weight: 700;
            padding: 1.1rem 0.8rem;
            text-align: center;
            font-size: 0.82rem;
            border-bottom: 4px solid #b28464;
        }
        th i { margin-right: 8px; }

        td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #eddccc;
            vertical-align: middle;
            background: #fcf7ef;
            color: #2b1b10;
        }
        tr:hover td { background: #faf0e6; }
        tr:last-child td { border-bottom: none; }

        .col-tanggal {
            font-weight: 800;
            font-size: 1.15rem;
            color: #5f341e;
            background: linear-gradient(135deg, #f7e4d4, #f2d9c4);
            text-align: center;
            width: 50px;
        }
        .col-hari {
            font-weight: 700;
            color: #4f2e1b;
            background: linear-gradient(135deg, #f0ddcc, #ead5c0);
            text-align: center;
            width: 70px;
        }

        .cell-editable {
            background: rgba(255, 245, 230, 0.3);
            border: 1px solid #e6cfb8;
            border-radius: 16px;
            padding: 8px 14px;
            width: 100%;
            font-size: 0.9rem;
            color: #2a1d12;
            transition: all 0.25s ease;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            min-height: 44px;
        }
        .cell-editable:focus {
            outline: none;
            border-color: #b28464;
            background: #fffcf5;
            box-shadow: 0 0 0 6px rgba(180, 120, 80, 0.10);
        }
        .cell-editable:hover {
            background: #fff6ea;
            border-color: #c4a084;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #2b1b10, #1f130b);
            color: #f7ece1;
            padding: 1rem 2.4rem;
            border-radius: 80px;
            font-weight: 500;
            box-shadow: 0 16px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.35s ease;
            pointer-events: none;
            z-index: 999;
            border-left: 6px solid #f1cfb5;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast i { font-size: 1.5rem; color: #f1cfb5; }

        .footer-note {
            margin-top: 1.4rem;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #5b3f2b;
            background: rgba(235, 210, 190, 0.3);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            border: 1px solid rgba(235, 210, 190, 0.2);
        }
        .footer-note i { color: #9d7053; margin-right: 6px; }

        @media (max-width: 700px) {
            .card { padding: 1.2rem; border-radius: 2rem; }
            .header {
                flex-direction: column;
                align-items: start;
                gap: 1rem;
                border-radius: 40px;
                padding: 1.2rem 1.5rem;
            }
            .header-left h1 { font-size: 1.6rem; }
            .header-actions { width: 100%; justify-content: flex-start; }
            .btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="card" id="scheduleCard">
        <div class="header">
            <div class="header-left">
                <div>
                    <h1>Pawon Mbah Gito</h1>
                    <small><i class="fas fa-calendar-alt" style="margin-right:8px;"></i>Jadwal Konten · Divisi Konten</small>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-save" id="saveBtn"><i class="fas fa-save"></i> Simpan</button>
                <button class="btn btn-image" id="exportImageBtn"><i class="fas fa-image"></i> Export Gambar</button>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag"></i> Tgl</th>
                        <th><i class="fas fa-calendar-day"></i> Hari</th>
                        <th style="min-width:190px;"><i class="fab fa-instagram"></i> Instagram (Feed/Reels)</th>
                        <th style="min-width:210px;"><i class="fab fa-tiktok"></i> TikTok (Harian)</th>
                        <th style="min-width:150px;"><i class="fab fa-youtube"></i> YouTube Shorts</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer-note">
            <span><i class="fas fa-pen-fancy"></i> Klik sel untuk mengubah</span>
            <span><i class="fas fa-save"></i> Simpan manual setelah perubahan</span>
            <span><i class="fas fa-palette"></i> #PawonMbahGito</span>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Tersimpan</span></div>

    <script>
        (function() {
            const initialData = [
                { tanggal: "1", hari: "Rabu", instagram: "Reels: Morning Vibes Pawon Mbah Gito (kabut, sawah, suara alam)", tiktok: "POV datang ke Pawon jam buka", shorts: "-" },
                { tanggal: "2", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Rawon", shorts: "Menu Prasmanan Terlengkap di Jogja" },
                { tanggal: "3", hari: "Jumat", instagram: "-", tiktok: "ASMR ambil lauk prasmanan", shorts: "15 Detik Bikin Lapar" },
                { tanggal: "4", hari: "Sabtu", instagram: "Feed: Hero Menu Bebek Sambal Tempong", tiktok: "Behind The Kitchen Bebek Tempong", shorts: "-" },
                { tanggal: "5", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Es Teler", shorts: "Weekend Vibes Pawon Mbah Gito" },
                { tanggal: "6", hari: "Senin", instagram: "Reels: Sebelum vs Sesudah Jam Makan", tiktok: "Time-lapse restoran ramai", shorts: "-" },
                { tanggal: "7", hari: "Selasa", instagram: "-", tiktok: "Proses memasak Bakmi Jawa Goreng", shorts: "Behind The Kitchen" },
                { tanggal: "8", hari: "Rabu", instagram: "Reels: Customer memilih lauk prasmanan", tiktok: "POV Pilih Lauk Favorit", shorts: "-" },
                { tanggal: "9", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Telang Fresh", shorts: "Signature Drink Hari Ini" },
                { tanggal: "10", hari: "Jumat", instagram: "-", tiktok: "Hospitality Challenge (Senyum & Sambutan)", shorts: "Pelayanan yang Membuat Betah" },
                { tanggal: "11", hari: "Sabtu", instagram: "Feed: Spot Foto Estetik Pawon", tiktok: "Hidden Spot Pawon", shorts: "-" },
                { tanggal: "12", hari: "Ahad", instagram: "-", tiktok: "Hero Menu Mie Lethek Godog", shorts: "First Impression Pelanggan" },
                { tanggal: "13", hari: "Senin", instagram: "Reels: Suasana Hujan di Pawon", tiktok: "Rain Ambience", shorts: "-" },
                { tanggal: "14", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Ayam Goreng Kampung PMG", shorts: "Ayam Kampung Favorit" },
                { tanggal: "15", hari: "Rabu", instagram: "Reels: Kenapa Orang Betah di Pawon?", tiktok: "Walking Tour Pawon", shorts: "-" },
                { tanggal: "16", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Roembulan", shorts: "Minuman Segar Wajib Dicoba" },
                { tanggal: "17", hari: "Jumat", instagram: "-", tiktok: "10 Menu Favorit dalam 15 Detik", shorts: "Menu Challenge" },
                { tanggal: "18", hari: "Sabtu", instagram: "Feed: Filosofi Pawon & Konsep Pedesaan", tiktok: "Cerita Pawon Mbah Gito", shorts: "-" },
                { tanggal: "19", hari: "Ahad", instagram: "-", tiktok: "Ramainya makan siang + Customer Reaction", shorts: "Lunch Rush" },
                { tanggal: "20", hari: "Senin", instagram: "Reels: Slow Motion Ambil Lauk Prasmanan", tiktok: "Food Cinematic", shorts: "-" },
                { tanggal: "21", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Sop Ayam Kampung", shorts: "Masakan Rumahan" },
                { tanggal: "22", hari: "Rabu", instagram: "Reels: Barista Performance (Latte Art / Pouring)", tiktok: "Coffee Making Cinematic", shorts: "-" },
                { tanggal: "23", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Ayam Bakar PMG", shorts: "Top 5 Menu Terlaris" },
                { tanggal: "24", hari: "Jumat", instagram: "-", tiktok: "Persiapan Sebelum Buka", shorts: "Before Opening" },
                { tanggal: "25", hari: "Sabtu", instagram: "Feed: Hero Menu Kembulan Penyetan", tiktok: "Makan Bareng Keluarga", shorts: "-" },
                { tanggal: "26", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Matcha Ice", shorts: "Hidden Gem Pawon" },
                { tanggal: "27", hari: "Senin", instagram: "Reels: Kesibukan Dapur Saat Jam Makan", tiktok: "Behind The Kitchen", shorts: "-" },
                { tanggal: "28", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Paket Syukur", shorts: "Behind The Counter" },
                { tanggal: "29", hari: "Rabu", instagram: "Reels: Golden Hour Pawon + Coffee Time", tiktok: "Morning Coffee & Village Vibes", shorts: "-" },
                { tanggal: "30", hari: "Kamis", instagram: "-", tiktok: "Bakmi Jawa Godog vs Mie Lethek Goreng + Barista membuat Kiwi Tropical & Summer Pineapple", shorts: "Battle Menu Favorit" },
                { tanggal: "31", hari: "Jumat", instagram: "-", tiktok: "Kompilasi Juli (Menu, Customer, Barista & Vibes)", shorts: "Best Moments Juli 2026" }
            ];

            const tbody = document.getElementById('tableBody');

            function renderTable(data) {
                tbody.innerHTML = '';
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.style.animation = `rowFadeIn ${0.3 + index * 0.02}s ease forwards`;
                    tr.style.opacity = '0';

                    const tdTanggal = document.createElement('td');
                    tdTanggal.className = 'col-tanggal';
                    tdTanggal.textContent = row.tanggal;

                    const tdHari = document.createElement('td');
                    tdHari.className = 'col-hari';
                    tdHari.textContent = row.hari;

                    const tdIg = document.createElement('td');
                    const igInput = document.createElement('textarea');
                    igInput.className = 'cell-editable';
                    igInput.rows = 1;
                    igInput.value = row.instagram;
                    igInput.dataset.field = 'instagram';
                    igInput.dataset.index = index;
                    tdIg.appendChild(igInput);

                    const tdTiktok = document.createElement('td');
                    const ttInput = document.createElement('textarea');
                    ttInput.className = 'cell-editable';
                    ttInput.rows = 1;
                    ttInput.value = row.tiktok;
                    ttInput.dataset.field = 'tiktok';
                    ttInput.dataset.index = index;
                    tdTiktok.appendChild(ttInput);

                    const tdShorts = document.createElement('td');
                    const shortsInput = document.createElement('textarea');
                    shortsInput.className = 'cell-editable';
                    shortsInput.rows = 1;
                    shortsInput.value = row.shorts;
                    shortsInput.dataset.field = 'shorts';
                    shortsInput.dataset.index = index;
                    tdShorts.appendChild(shortsInput);

                    tr.appendChild(tdTanggal);
                    tr.appendChild(tdHari);
                    tr.appendChild(tdIg);
                    tr.appendChild(tdTiktok);
                    tr.appendChild(tdShorts);
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.cell-editable').forEach(ta => {
                    autoResize(ta);
                    ta.addEventListener('input', function() { autoResize(this); });
                });

                const style = document.createElement('style');
                style.textContent = `
                    @keyframes rowFadeIn {
                        from { opacity: 0; transform: translateY(10px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                `;
                document.head.appendChild(style);
            }

            function autoResize(el) {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            }

            function getTableData() {
                const rows = tbody.querySelectorAll('tr');
                const data = [];
                rows.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    data.push({
                        tanggal: tds[0]?.textContent.trim() || '',
                        hari: tds[1]?.textContent.trim() || '',
                        instagram: tds[2]?.querySelector('textarea')?.value || '',
                        tiktok: tds[3]?.querySelector('textarea')?.value || '',
                        shorts: tds[4]?.querySelector('textarea')?.value || ''
                    });
                });
                return data;
            }

            function showToast(msg) {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            document.getElementById('saveBtn').addEventListener('click', function() {
                const data = getTableData();
                try {
                    localStorage.setItem('pawonScheduleData', JSON.stringify(data));
                    showToast('📋 Jadwal berhasil disimpan!');
                } catch(e) {
                    showToast('⚠️ Gagal menyimpan data');
                }
            });

            // ========== EXPORT GAMBAR (JPEG) TIDAK TERPOTONG ==========
            document.getElementById('exportImageBtn').addEventListener('click', function() {
                const card = document.getElementById('scheduleCard');
                const clone = card.cloneNode(true);
                
                // Hapus tombol aksi
                const actions = clone.querySelector('.header-actions');
                if (actions) actions.remove();
                
                // Hapus footer note
                const footer = clone.querySelector('.footer-note');
                if (footer) footer.remove();
                
                // Ubah textarea menjadi div (tampilan statis)
                clone.querySelectorAll('.cell-editable').forEach(ta => {
                    const div = document.createElement('div');
                    div.textContent = ta.value;
                    div.style.cssText = `
                        padding: 8px 14px;
                        background: rgba(255, 245, 230, 0.3);
                        border: 1px solid #e6cfb8;
                        border-radius: 16px;
                        font-size: 0.9rem;
                        color: #2a1d12;
                        line-height: 1.5;
                        min-height: 44px;
                        font-family: 'Inter', sans-serif;
                        width: 100%;
                        box-sizing: border-box;
                    `;
                    ta.parentNode.replaceChild(div, ta);
                });

                // Atur lebar clone agar sesuai dengan konten (1200px)
                clone.style.cssText = `
                    max-width: 1200px;
                    width: 1200px;
                    background: #fcf7ef;
                    border-radius: 3.5rem;
                    padding: 2rem;
                    box-shadow: none;
                    border: 2px solid #d9b99b;
                    margin: 0 auto;
                    box-sizing: border-box;
                    overflow: visible;
                `;

                // Buat container untuk capture
                const container = document.createElement('div');
                container.style.cssText = `
                    position: absolute;
                    left: -9999px;
                    top: 0;
                    width: 1200px;
                    background: white;
                    padding: 10px;
                    box-sizing: border-box;
                    overflow: visible;
                `;
                container.appendChild(clone);
                document.body.appendChild(container);

                showToast('⏳ Menyiapkan gambar...');

                // Capture dengan html2canvas
                html2canvas(container, {
                    scale: 2.8,
                    useCORS: true,
                    logging: false,
                    width: 1200,
                    height: container.scrollHeight,
                    backgroundColor: '#ffffff',
                    allowTaint: true,
                    letterRendering: true,
                    onclone: function(doc) {
                        // Pastikan semua elemen terlihat
                    }
                }).then(canvas => {
                    // Buat link download
                    const link = document.createElement('a');
                    link.download = 'Pawon_Mbah_Gito_Schedule.jpg';
                    link.href = canvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                    
                    document.body.removeChild(container);
                    showToast('🖼️ Gambar berhasil diekspor!');
                }).catch(err => {
                    console.error(err);
                    document.body.removeChild(container);
                    showToast('⚠️ Gagal ekspor gambar, coba lagi.');
                });
            });

            // Load data
            let storedData = null;
            try {
                const raw = localStorage.getItem('pawonScheduleData');
                if (raw) storedData = JSON.parse(raw);
            } catch(e) {}
            const startData = (storedData && storedData.length === initialData.length) ? storedData : initialData;
            renderTable(startData);
        })();
    </script>

</body>
</html>
