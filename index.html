<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Pawon Mbah Gito · Divisi Konten</title>
    <!-- Font & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2pdf (untuk export PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5efe6 0%, #e8dfd3 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 250, 240, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.8rem;
            box-shadow: 0 30px 50px rgba(60, 40, 20, 0.25), 0 10px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 235, 210, 0.6);
            transition: all 0.2s;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header-left i {
            font-size: 2.4rem;
            color: #7b4a2e;
            background: #eadbc5;
            padding: 0.6rem;
            border-radius: 20px;
            box-shadow: inset 0 2px 6px rgba(90, 60, 30, 0.15);
        }
        .header-left h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #3d2a1b;
        }
        .header-left small {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: #6b4f37;
            margin-top: 2px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: #fffcf5;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #3d2a1b;
            box-shadow: 0 4px 10px rgba(90, 60, 30, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #dccbbc;
        }
        .btn i {
            font-size: 1rem;
            color: #7b4a2e;
        }
        .btn-primary {
            background: #7b4a2e;
            border: 1px solid #633b24;
            color: white;
        }
        .btn-primary i {
            color: #f7ede1;
        }
        .btn-primary:hover {
            background: #633b24;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(90, 50, 20, 0.25);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #b99f86;
        }
        .btn-outline:hover {
            background: #f2e3d4;
            border-color: #7b4a2e;
        }
        .btn-success {
            background: #2b6e4f;
            border: 1px solid #1e553b;
            color: white;
        }
        .btn-success i {
            color: #e6f0e8;
        }
        .btn-success:hover {
            background: #1e553b;
            transform: scale(1.02);
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            background: rgba(255, 245, 235, 0.5);
            padding: 0.25rem 0.25rem 0.25rem 0.25rem;
            box-shadow: inset 0 2px 6px rgba(80, 50, 20, 0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 880px;
            background: #fdf9f2;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(70, 40, 15, 0.05);
        }
        th {
            background: #dac9b4;
            color: #2d1e12;
            font-weight: 700;
            padding: 1rem 0.8rem;
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            border-bottom: 3px solid #b39278;
        }
        td {
            padding: 0.9rem 0.8rem;
            border-bottom: 1px solid #e2d3c0;
            vertical-align: middle;
            background: #fcf7ef;
            color: #2b1e13;
        }
        tr:last-child td {
            border-bottom: none;
        }
        td:first-child, th:first-child { padding-left: 1rem; }
        td:last-child, th:last-child { padding-right: 1rem; }
        .col-tanggal { font-weight: 700; color: #4f351f; width: 60px; text-align: center; }
        .col-hari { font-weight: 600; color: #5f3f28; width: 70px; text-align: center; }
        .col-instagram { min-width: 180px; }
        .col-tiktok { min-width: 200px; }
        .col-shorts { min-width: 140px; }
        .cell-editable {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 6px 10px;
            width: 100%;
            font-size: 0.9rem;
            color: #281e13;
            transition: 0.15s;
            font-family: inherit;
            resize: vertical;
            background: rgba(255, 245, 230, 0.2);
            line-height: 1.4;
        }
        .cell-editable:focus {
            outline: none;
            border-color: #b39278;
            background: #fffcf5;
            box-shadow: 0 0 0 4px rgba(123, 74, 46, 0.08);
        }
        .cell-editable:hover {
            background: #fff7eb;
            border-color: #dac9b4;
        }
        .badge {
            background: #dccbbc;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #3d2a1b;
            display: inline-block;
            letter-spacing: 0.02em;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2d1e12;
            color: #f2e3d4;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.25s ease;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast i { color: #c8b094; font-size: 1.2rem; }

        @media (max-width: 700px) {
            .card { padding: 1.2rem; }
            .header { flex-direction: column; align-items: start; gap: 1rem; }
            .header-left h1 { font-size: 1.5rem; }
        }
        /* PDF export styling – agar tidak terpotong */
        @media print {
            body { background: white; padding: 0.2in; }
            .card { box-shadow: none; padding: 0.2in; background: white; }
            .btn, .header-actions { display: none !important; }
            .cell-editable { border: 1px solid #ccc; background: white; }
            table { box-shadow: none; }
            th { background: #e2d3c0; }
        }
    </style>
</head>
<body>

    <div class="card" id="scheduleCard">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <i class="fas fa-utensils"></i>
                <div>
                    <h1>Pawon Mbah Gito</h1>
                    <small><i class="fas fa-calendar-alt" style="margin-right:6px;"></i>Jadwal Konten · Divisi Konten</small>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-success" id="saveBtn"><i class="fas fa-save"></i> Simpan</button>
                <button class="btn btn-primary" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
            </div>
        </div>

        <!-- Tabel Schedule -->
        <div class="table-wrapper" id="tableWrapper">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Hari</th>
                        <th class="col-instagram">Instagram <span style="font-weight:400;">(Feed/Reels)</span></th>
                        <th class="col-tiktok">TikTok <span style="font-weight:400;">(Harian)</span></th>
                        <th class="col-shorts">YouTube Shorts</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- data akan diisi oleh javascript -->
                </tbody>
            </table>
        </div>
        <div style="margin-top:1rem; font-size:0.8rem; color:#6b4f37; display:flex; gap:20px; flex-wrap:wrap;">
            <span><i class="fas fa-pen" style="margin-right:6px;"></i>Klik sel untuk mengubah konten</span>
            <span><i class="fas fa-save" style="margin-right:6px;"></i>Setiap perubahan tersimpan manual</span>
        </div>
    </div>

    <!-- Toast notifikasi -->
    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Tersimpan</span></div>

    <script>
        (function() {
            // ---------- DATA AWAL ----------
            const initialData = [
                { tanggal: "1", hari: "Rabu", instagram: "Reels: Morning Vibes Pawon Mbah Gito (kabut, sawah, suara alam)", tiktok: "POV datang ke Pawon jam buka", shorts: "-" },
                { tanggal: "2", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Rawon", shorts: "Menu Prasmanan Terlengkap di Jogja" },
                { tanggal: "3", hari: "Jumat", instagram: "-", tiktok: "ASMR ambil lauk prasmanan", shorts: "15 Detik Bikin Lapar" },
                { tanggal: "4", hari: "Sabtu", instagram: "Feed: Hero Menu Bebek Sambal Tempong", tiktok: "Behind The Kitchen Bebek Tempong", shorts: "-" },
                { tanggal: "5", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Es Teler", shorts: "Weekend Vibes Pawon Mbah Gito" },
                { tanggal: "6", hari: "Senin", instagram: "Reels: Sebelum vs Sesudah Jam Makan", tiktok: "Time-lapse restoran ramai", shorts: "-" },
                { tanggal: "7", hari: "Selasa", instagram: "-", tiktok: "Proses memasak Bakmi Jawa Goreng", shorts: "Behind The Kitchen" },
                { tanggal: "8", hari: "Rabu", instagram: "Reels: Customer memilih lauk prasmanan", tiktok: "POV Pilih Lauk Favorit", shorts: "-" },
                { tanggal: "9", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Telang Fresh", shorts: "Signature Drink Hari Ini" },
                { tanggal: "10", hari: "Jumat", instagram: "-", tiktok: "Hospitality Challenge (Senyum & Sambutan)", shorts: "Pelayanan yang Membuat Betah" },
                { tanggal: "11", hari: "Sabtu", instagram: "Feed: Spot Foto Estetik Pawon", tiktok: "Hidden Spot Pawon", shorts: "-" },
                { tanggal: "12", hari: "Ahad", instagram: "-", tiktok: "Hero Menu Mie Lethek Godog", shorts: "First Impression Pelanggan" },
                { tanggal: "13", hari: "Senin", instagram: "Reels: Suasana Hujan di Pawon", tiktok: "Rain Ambience", shorts: "-" },
                { tanggal: "14", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Ayam Goreng Kampung PMG", shorts: "Ayam Kampung Favorit" },
                { tanggal: "15", hari: "Rabu", instagram: "Reels: Kenapa Orang Betah di Pawon?", tiktok: "Walking Tour Pawon", shorts: "-" },
                { tanggal: "16", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Roembulan", shorts: "Minuman Segar Wajib Dicoba" },
                { tanggal: "17", hari: "Jumat", instagram: "-", tiktok: "10 Menu Favorit dalam 15 Detik", shorts: "Menu Challenge" },
                { tanggal: "18", hari: "Sabtu", instagram: "Feed: Filosofi Pawon & Konsep Pedesaan", tiktok: "Cerita Pawon Mbah Gito", shorts: "-" },
                { tanggal: "19", hari: "Ahad", instagram: "-", tiktok: "Ramainya makan siang + Customer Reaction", shorts: "Lunch Rush" },
                { tanggal: "20", hari: "Senin", instagram: "Reels: Slow Motion Ambil Lauk Prasmanan", tiktok: "Food Cinematic", shorts: "-" },
                { tanggal: "21", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Sop Ayam Kampung", shorts: "Masakan Rumahan" },
                { tanggal: "22", hari: "Rabu", instagram: "Reels: Barista Performance (Latte Art / Pouring)", tiktok: "Coffee Making Cinematic", shorts: "-" },
                { tanggal: "23", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Ayam Bakar PMG", shorts: "Top 5 Menu Terlaris" },
                { tanggal: "24", hari: "Jumat", instagram: "-", tiktok: "Persiapan Sebelum Buka", shorts: "Before Opening" },
                { tanggal: "25", hari: "Sabtu", instagram: "Feed: Hero Menu Kembulan Penyetan", tiktok: "Makan Bareng Keluarga", shorts: "-" },
                { tanggal: "26", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Matcha Ice", shorts: "Hidden Gem Pawon" },
                { tanggal: "27", hari: "Senin", instagram: "Reels: Kesibukan Dapur Saat Jam Makan", tiktok: "Behind The Kitchen", shorts: "-" },
                { tanggal: "28", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Paket Syukur", shorts: "Behind The Counter" },
                { tanggal: "29", hari: "Rabu", instagram: "Reels: Golden Hour Pawon + Coffee Time", tiktok: "Morning Coffee & Village Vibes", shorts: "-" },
                { tanggal: "30", hari: "Kamis", instagram: "-", tiktok: "Bakmi Jawa Godog vs Mie Lethek Goreng + Barista membuat Kiwi Tropical & Summer Pineapple", shorts: "Battle Menu Favorit" },
                { tanggal: "31", hari: "Jumat", instagram: "-", tiktok: "Kompilasi Juli (Menu, Customer, Barista & Vibes)", shorts: "Best Moments Juli 2026" }
            ];

            // ---------- RENDER TABLE ----------
            const tbody = document.getElementById('tableBody');

            function renderTable(data) {
                tbody.innerHTML = '';
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    // kolom tanggal
                    const tdTanggal = document.createElement('td');
                    tdTanggal.className = 'col-tanggal';
                    tdTanggal.textContent = row.tanggal;

                    const tdHari = document.createElement('td');
                    tdHari.className = 'col-hari';
                    tdHari.textContent = row.hari;

                    const tdIg = document.createElement('td');
                    tdIg.className = 'col-instagram';
                    const igInput = document.createElement('textarea');
                    igInput.className = 'cell-editable';
                    igInput.rows = 1;
                    igInput.value = row.instagram;
                    igInput.dataset.field = 'instagram';
                    igInput.dataset.index = index;
                    tdIg.appendChild(igInput);

                    const tdTiktok = document.createElement('td');
                    tdTiktok.className = 'col-tiktok';
                    const ttInput = document.createElement('textarea');
                    ttInput.className = 'cell-editable';
                    ttInput.rows = 1;
                    ttInput.value = row.tiktok;
                    ttInput.dataset.field = 'tiktok';
                    ttInput.dataset.index = index;
                    tdTiktok.appendChild(ttInput);

                    const tdShorts = document.createElement('td');
                    tdShorts.className = 'col-shorts';
                    const shortsInput = document.createElement('textarea');
                    shortsInput.className = 'cell-editable';
                    shortsInput.rows = 1;
                    shortsInput.value = row.shorts;
                    shortsInput.dataset.field = 'shorts';
                    shortsInput.dataset.index = index;
                    tdShorts.appendChild(shortsInput);

                    tr.appendChild(tdTanggal);
                    tr.appendChild(tdHari);
                    tr.appendChild(tdIg);
                    tr.appendChild(tdTiktok);
                    tr.appendChild(tdShorts);
                    tbody.appendChild(tr);
                });

                // auto-resize textarea
                document.querySelectorAll('.cell-editable').forEach(ta => {
                    autoResize(ta);
                    ta.addEventListener('input', function() {
                        autoResize(this);
                    });
                });
            }

            function autoResize(el) {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            }

            // ---------- GET DATA DARI TABLE (untuk save / export) ----------
            function getTableData() {
                const rows = tbody.querySelectorAll('tr');
                const data = [];
                rows.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    const tanggal = tds[0]?.textContent.trim() || '';
                    const hari = tds[1]?.textContent.trim() || '';
                    const ig = tds[2]?.querySelector('textarea')?.value || '';
                    const tiktok = tds[3]?.querySelector('textarea')?.value || '';
                    const shorts = tds[4]?.querySelector('textarea')?.value || '';
                    data.push({ tanggal, hari, instagram: ig, tiktok, shorts });
                });
                return data;
            }

            // ---------- SIMPAN (toast) ----------
            function showToast(msg = '✅ Jadwal berhasil disimpan!') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2800);
            }

            document.getElementById('saveBtn').addEventListener('click', function() {
                // ambil data terbaru dari textarea
                const data = getTableData();
                // simpan ke localStorage (opsional) atau cukup tampilkan notifikasi
                // kita simpan ke localStorage agar persist
                try {
                    localStorage.setItem('pawonScheduleData', JSON.stringify(data));
                    showToast('📋 Jadwal berhasil disimpan!');
                } catch(e) {
                    showToast('⚠️ Gagal menyimpan data');
                }
            });

            // ---------- EXPORT PDF (menggunakan html2pdf) ----------
            document.getElementById('exportPdfBtn').addEventListener('click', function() {
                // ambil elemen card (tabel + header)
                const element = document.getElementById('scheduleCard');
                // clone untuk menghindari efek tombol yang ikut
                const clone = element.cloneNode(true);
                // hapus tombol aksi di clone
                const actions = clone.querySelector('.header-actions');
                if (actions) actions.remove();
                // tambahkan style khusus agar tidak terpotong
                clone.style.background = 'white';
                clone.style.padding = '20px';
                clone.style.borderRadius = '0';
                clone.style.boxShadow = 'none';
                clone.style.maxWidth = '100%';
                // pastikan semua textarea terlihat
                const textareas = clone.querySelectorAll('.cell-editable');
                textareas.forEach(ta => {
                    ta.style.border = '1px solid #ccc';
                    ta.style.background = 'white';
                    ta.style.resize = 'none';
                });

                // siapkan opsi PDF
                const opt = {
                    margin:        [0.4, 0.4, 0.4, 0.4], // top, right, bottom, left (in)
                    filename:      'Pawon_Mbah_Gito_Schedule.pdf',
                    image:         { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, letterRendering: true, useCORS: true, logging: false },
                    jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' } // landscape agar lebar
                };

                // tampilkan loading
                showToast('⏳ Menyiapkan PDF...');

                // Generate PDF
                html2pdf().set(opt).from(clone).save().then(() => {
                    showToast('📄 PDF berhasil diekspor!');
                }).catch(err => {
                    console.error(err);
                    showToast('⚠️ Gagal ekspor PDF, coba lagi.');
                });
            });

            // ---------- INIT: muat data dari localStorage atau initial ----------
            let storedData = null;
            try {
                const raw = localStorage.getItem('pawonScheduleData');
                if (raw) storedData = JSON.parse(raw);
            } catch(e) {}

            const startData = (storedData && storedData.length === initialData.length) ? storedData : initialData;
            renderTable(startData);

            // simpan otomatis saat pertama load (agar konsisten)
            // tidak perlu, user bisa simpan manual

            // event: jika ada perubahan di textarea, kita tandai (opsional)
            // tidak perlu auto-save, sesuai permintaan: bisa di save manual

            // ---------- TAMBAHAN: jika user mengetik, auto-resize ----------
            // sudah di handle di renderTable

            // handle jika pengguna menambah / mengubah manual, data tetap tersimpan via tombol save
        })();
    </script>

</body>
</html>
