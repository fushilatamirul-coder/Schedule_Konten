<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawon Mbah Gito · Divisi Konten</title>
    <!-- Font & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 10% 20%, #fdf0e3 0%, #f5dccb 100%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { background: radial-gradient(circle at 10% 20%, #fdf0e3 0%, #f5dccb 100%); }
            50% { background: radial-gradient(circle at 80% 40%, #f8e4d4 0%, #f0ceba 100%); }
            100% { background: radial-gradient(circle at 30% 70%, #ffe8d6 0%, #f2cfb8 100%); }
        }

        /* ===== CARD UTAMA ===== */
        .card {
            max-width: 1440px;
            width: 100%;
            background: rgba(255, 248, 240, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.8rem;
            box-shadow: 0 40px 70px rgba(100, 60, 30, 0.25), 0 10px 30px rgba(0,0,0,0.06);
            border: 1px solid rgba(255, 225, 200, 0.4);
            animation: cardFloat 6s ease-in-out infinite;
            transition: all 0.3s;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            background: linear-gradient(135deg, #fbeee2 0%, #f6e0cd 100%);
            padding: 0.6rem 2rem 0.6rem 2rem;
            border-radius: 100px;
            border: 1px solid #ebd0ba;
            box-shadow: 0 6px 20px rgba(150, 90, 50, 0.12), inset 0 2px 8px rgba(255, 215, 175, 0.5);
            transition: all 0.3s;
        }
        .header:hover {
            box-shadow: 0 10px 28px rgba(150, 90, 50, 0.20);
            transform: scale(1.005);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .header-left h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #5a3421, #2f1b10, #6f3f28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 12px rgba(180, 110, 60, 0.15);
        }
        .header-left small {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #7a543b;
            background: rgba(235, 205, 185, 0.5);
            padding: 0.15rem 1.2rem;
            border-radius: 40px;
            margin-top: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid #e6ceb9;
        }

        .header-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        /* ===== BUTTONS ===== */
        .btn {
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 4px 14px rgba(80, 50, 25, 0.08);
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: 0.3s;
        }
        .btn:hover::after { opacity: 1; }
        .btn:active { transform: scale(0.95); }

        .btn-save {
            background: linear-gradient(135deg, #3e7a5c, #2b5c43);
            color: white;
            border: 1px solid #1f4a34;
            box-shadow: 0 6px 18px rgba(40, 90, 60, 0.25);
        }
        .btn-save:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 28px rgba(40, 90, 60, 0.35);
        }
        .btn-save i { color: #d4edd9; }

        .btn-pdf {
            background: linear-gradient(135deg, #c0392b, #a93226);
            color: white;
            border: 1px solid #8a2a1f;
            box-shadow: 0 6px 18px rgba(150, 40, 40, 0.25);
        }
        .btn-pdf:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 28px rgba(150, 40, 40, 0.35);
        }
        .btn-pdf i { color: #fadada; }

        /* ===== TABLE WRAPPER ===== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 32px;
            background: linear-gradient(145deg, #f5e8da, #ecdac9);
            padding: 0.4rem;
            box-shadow: inset 0 2px 16px rgba(130, 80, 50, 0.08);
            animation: tableGlow 8s ease-in-out infinite alternate;
        }
        @keyframes tableGlow {
            0% { box-shadow: inset 0 2px 16px rgba(130, 80, 50, 0.08), 0 0 20px rgba(200, 150, 110, 0.05); }
            100% { box-shadow: inset 0 2px 16px rgba(130, 80, 50, 0.08), 0 0 40px rgba(200, 150, 110, 0.15); }
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.9rem;
            min-width: 920px;
            background: #fffbf5;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(90, 60, 30, 0.08);
        }

        /* ===== TH ===== */
        th {
            background: linear-gradient(145deg, #d9b99b, #c9a384);
            color: #281b10;
            font-weight: 700;
            padding: 1.1rem 0.8rem;
            text-align: center;
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            border-bottom: 4px solid #b28464;
            text-shadow: 0 1px 2px rgba(255, 225, 200, 0.3);
            position: relative;
        }
        th i {
            margin-right: 8px;
            color: #4f2f1d;
            font-size: 1.1rem;
        }
        th:first-child { border-radius: 28px 0 0 0; }
        th:last-child { border-radius: 0 28px 0 0; }

        /* ===== TD ===== */
        td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #eddccc;
            vertical-align: middle;
            background: #fcf7ef;
            color: #2b1b10;
            transition: background 0.2s;
        }
        tr:hover td {
            background: #faf0e6;
        }
        tr:last-child td { border-bottom: none; }
        td:first-child, th:first-child { padding-left: 1.2rem; }
        td:last-child, th:last-child { padding-right: 1.2rem; }

        /* kolom tanggal & hari dengan warna gradasi */
        .col-tanggal {
            font-weight: 800;
            font-size: 1.15rem;
            color: #5f341e;
            background: linear-gradient(135deg, #f7e4d4, #f2d9c4);
            text-align: center;
            width: 50px;
            border-radius: 20px 0 0 20px;
            position: relative;
        }
        .col-hari {
            font-weight: 700;
            color: #4f2e1b;
            background: linear-gradient(135deg, #f0ddcc, #ead5c0);
            text-align: center;
            width: 70px;
        }

        /* ===== CELL EDITABLE ===== */
        .cell-editable {
            background: rgba(255, 245, 230, 0.3);
            border: 1px solid #e6cfb8;
            border-radius: 16px;
            padding: 8px 14px;
            width: 100%;
            font-size: 0.9rem;
            color: #2a1d12;
            transition: all 0.25s ease;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            box-shadow: inset 0 1px 4px rgba(100, 60, 30, 0.02);
            min-height: 44px;
        }
        .cell-editable:focus {
            outline: none;
            border-color: #b28464;
            background: #fffcf5;
            box-shadow: 0 0 0 6px rgba(180, 120, 80, 0.10), inset 0 1px 8px rgba(100, 60, 30, 0.04);
            transform: scale(1.01);
        }
        .cell-editable:hover {
            background: #fff6ea;
            border-color: #c4a084;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #2b1b10, #1f130b);
            color: #f7ece1;
            padding: 1rem 2.4rem;
            border-radius: 80px;
            font-weight: 500;
            box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,215,175,0.1);
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 999;
            border-left: 6px solid #f1cfb5;
            backdrop-filter: blur(6px);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast i { font-size: 1.5rem; color: #f1cfb5; animation: toastPop 0.6s ease; }
        @keyframes toastPop {
            0% { transform: scale(0); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ===== FOOTER ===== */
        .footer-note {
            margin-top: 1.4rem;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #5b3f2b;
            background: rgba(235, 210, 190, 0.3);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(235, 210, 190, 0.2);
            transition: 0.3s;
        }
        .footer-note:hover {
            background: rgba(235, 210, 190, 0.45);
        }
        .footer-note i {
            color: #9d7053;
            margin-right: 6px;
            animation: iconFloat 3s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .card { padding: 1.2rem; border-radius: 2rem; }
            .header {
                flex-direction: column;
                align-items: start;
                gap: 1rem;
                border-radius: 40px;
                padding: 1.2rem 1.5rem;
            }
            .header-left h1 { font-size: 1.6rem; }
            .header-actions { width: 100%; justify-content: flex-start; }
            .btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
        }

        /* ================================================================ */
        /* ===== STYLE KHUSUS UNTUK PDF (TIDAK TERPOTONG) ===== */
        /* ================================================================ */
        .pdf-container {
            background: white;
            padding: 20px 25px;
            font-family: 'Inter', -apple-system, sans-serif;
            max-width: 1300px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .pdf-container .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid #b28464;
            padding-bottom: 10px;
            margin-bottom: 16px;
        }
        .pdf-container .pdf-header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #3d2417;
            letter-spacing: -0.02em;
        }
        .pdf-container .pdf-header .pdf-sub {
            font-size: 12px;
            color: #7a543b;
            font-weight: 500;
            margin-top: 2px;
        }
        .pdf-container .pdf-header .pdf-date {
            font-size: 11px;
            color: #6b4f37;
            background: #f0e1d2;
            padding: 3px 14px;
            border-radius: 40px;
            font-weight: 600;
            white-space: nowrap;
        }
        .pdf-container .pdf-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10.5px;
            margin-top: 4px;
            table-layout: fixed;
        }
        .pdf-container .pdf-table th {
            background: #d9b99b;
            color: #281b10;
            font-weight: 700;
            padding: 7px 5px;
            text-align: center;
            border: 1px solid #b99a7e;
            font-size: 10px;
            letter-spacing: 0.03em;
            word-wrap: break-word;
        }
        .pdf-container .pdf-table td {
            padding: 5px 5px;
            border: 1px solid #dccbbc;
            vertical-align: middle;
            background: #fcf7ef;
            color: #2b1b10;
            line-height: 1.35;
            font-size: 10px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .pdf-container .pdf-table .pdf-tgl {
            text-align: center;
            font-weight: 700;
            background: #f7e4d4;
            width: 30px;
            font-size: 10.5px;
        }
        .pdf-container .pdf-table .pdf-hari {
            text-align: center;
            font-weight: 600;
            background: #f0ddcc;
            width: 50px;
            font-size: 10.5px;
        }
        .pdf-container .pdf-table .col-ig {
            width: 22%;
        }
        .pdf-container .pdf-table .col-tt {
            width: 28%;
        }
        .pdf-container .pdf-table .col-yt {
            width: 18%;
        }
        .pdf-container .pdf-footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #d9b99b;
            padding-top: 8px;
            font-size: 10.5px;
            color: #5b3f2b;
        }
        .pdf-container .pdf-footer .pdf-brand {
            font-weight: 700;
            color: #3d2417;
        }
        .pdf-container .pdf-footer .pdf-brand i {
            color: #9d7053;
            margin-right: 6px;
        }
        .pdf-container .pdf-footer .pdf-page {
            background: #f0e1d2;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 9.5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card" id="scheduleCard">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div>
                    <h1>Pawon Mbah Gito</h1>
                    <small><i class="fas fa-calendar-alt" style="margin-right:8px;"></i>Jadwal Konten · Divisi Konten</small>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-save" id="saveBtn"><i class="fas fa-save"></i> Simpan</button>
                <button class="btn btn-pdf" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper" id="tableWrapper">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag"></i> Tgl</th>
                        <th><i class="fas fa-calendar-day"></i> Hari</th>
                        <th style="min-width:190px;"><i class="fab fa-instagram"></i> Instagram <span style="font-weight:400;">(Feed/Reels)</span></th>
                        <th style="min-width:210px;"><i class="fab fa-tiktok"></i> TikTok <span style="font-weight:400;">(Harian)</span></th>
                        <th style="min-width:150px;"><i class="fab fa-youtube"></i> YouTube Shorts</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- JS render -->
                </tbody>
            </table>
        </div>

        <div class="footer-note">
            <span><i class="fas fa-pen-fancy"></i> Klik sel untuk mengubah</span>
            <span><i class="fas fa-save"></i> Simpan manual setelah perubahan</span>
            <span><i class="fas fa-palette"></i> #PawonMbahGito</span>
            <span><i class="fas fa-magic"></i> Animasi modern</span>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Tersimpan</span></div>

    <script>
        (function() {
            // ---------- DATA ----------
            const initialData = [
                { tanggal: "1", hari: "Rabu", instagram: "Reels: Morning Vibes Pawon Mbah Gito (kabut, sawah, suara alam)", tiktok: "POV datang ke Pawon jam buka", shorts: "-" },
                { tanggal: "2", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Rawon", shorts: "Menu Prasmanan Terlengkap di Jogja" },
                { tanggal: "3", hari: "Jumat", instagram: "-", tiktok: "ASMR ambil lauk prasmanan", shorts: "15 Detik Bikin Lapar" },
                { tanggal: "4", hari: "Sabtu", instagram: "Feed: Hero Menu Bebek Sambal Tempong", tiktok: "Behind The Kitchen Bebek Tempong", shorts: "-" },
                { tanggal: "5", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Es Teler", shorts: "Weekend Vibes Pawon Mbah Gito" },
                { tanggal: "6", hari: "Senin", instagram: "Reels: Sebelum vs Sesudah Jam Makan", tiktok: "Time-lapse restoran ramai", shorts: "-" },
                { tanggal: "7", hari: "Selasa", instagram: "-", tiktok: "Proses memasak Bakmi Jawa Goreng", shorts: "Behind The Kitchen" },
                { tanggal: "8", hari: "Rabu", instagram: "Reels: Customer memilih lauk prasmanan", tiktok: "POV Pilih Lauk Favorit", shorts: "-" },
                { tanggal: "9", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Telang Fresh", shorts: "Signature Drink Hari Ini" },
                { tanggal: "10", hari: "Jumat", instagram: "-", tiktok: "Hospitality Challenge (Senyum & Sambutan)", shorts: "Pelayanan yang Membuat Betah" },
                { tanggal: "11", hari: "Sabtu", instagram: "Feed: Spot Foto Estetik Pawon", tiktok: "Hidden Spot Pawon", shorts: "-" },
                { tanggal: "12", hari: "Ahad", instagram: "-", tiktok: "Hero Menu Mie Lethek Godog", shorts: "First Impression Pelanggan" },
                { tanggal: "13", hari: "Senin", instagram: "Reels: Suasana Hujan di Pawon", tiktok: "Rain Ambience", shorts: "-" },
                { tanggal: "14", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Ayam Goreng Kampung PMG", shorts: "Ayam Kampung Favorit" },
                { tanggal: "15", hari: "Rabu", instagram: "Reels: Kenapa Orang Betah di Pawon?", tiktok: "Walking Tour Pawon", shorts: "-" },
                { tanggal: "16", hari: "Kamis", instagram: "-", tiktok: "Barista membuat Roembulan", shorts: "Minuman Segar Wajib Dicoba" },
                { tanggal: "17", hari: "Jumat", instagram: "-", tiktok: "10 Menu Favorit dalam 15 Detik", shorts: "Menu Challenge" },
                { tanggal: "18", hari: "Sabtu", instagram: "Feed: Filosofi Pawon & Konsep Pedesaan", tiktok: "Cerita Pawon Mbah Gito", shorts: "-" },
                { tanggal: "19", hari: "Ahad", instagram: "-", tiktok: "Ramainya makan siang + Customer Reaction", shorts: "Lunch Rush" },
                { tanggal: "20", hari: "Senin", instagram: "Reels: Slow Motion Ambil Lauk Prasmanan", tiktok: "Food Cinematic", shorts: "-" },
                { tanggal: "21", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Sop Ayam Kampung", shorts: "Masakan Rumahan" },
                { tanggal: "22", hari: "Rabu", instagram: "Reels: Barista Performance (Latte Art / Pouring)", tiktok: "Coffee Making Cinematic", shorts: "-" },
                { tanggal: "23", hari: "Kamis", instagram: "-", tiktok: "Hero Menu Ayam Bakar PMG", shorts: "Top 5 Menu Terlaris" },
                { tanggal: "24", hari: "Jumat", instagram: "-", tiktok: "Persiapan Sebelum Buka", shorts: "Before Opening" },
                { tanggal: "25", hari: "Sabtu", instagram: "Feed: Hero Menu Kembulan Penyetan", tiktok: "Makan Bareng Keluarga", shorts: "-" },
                { tanggal: "26", hari: "Ahad", instagram: "-", tiktok: "Barista membuat Matcha Ice", shorts: "Hidden Gem Pawon" },
                { tanggal: "27", hari: "Senin", instagram: "Reels: Kesibukan Dapur Saat Jam Makan", tiktok: "Behind The Kitchen", shorts: "-" },
                { tanggal: "28", hari: "Selasa", instagram: "-", tiktok: "Hero Menu Paket Syukur", shorts: "Behind The Counter" },
                { tanggal: "29", hari: "Rabu", instagram: "Reels: Golden Hour Pawon + Coffee Time", tiktok: "Morning Coffee & Village Vibes", shorts: "-" },
                { tanggal: "30", hari: "Kamis", instagram: "-", tiktok: "Bakmi Jawa Godog vs Mie Lethek Goreng + Barista membuat Kiwi Tropical & Summer Pineapple", shorts: "Battle Menu Favorit" },
                { tanggal: "31", hari: "Jumat", instagram: "-", tiktok: "Kompilasi Juli (Menu, Customer, Barista & Vibes)", shorts: "Best Moments Juli 2026" }
            ];

            // ---------- RENDER ----------
            const tbody = document.getElementById('tableBody');

            function renderTable(data) {
                tbody.innerHTML = '';
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.style.animation = `rowFadeIn ${0.3 + index * 0.02}s ease forwards`;
                    tr.style.opacity = '0';

                    const tdTanggal = document.createElement('td');
                    tdTanggal.className = 'col-tanggal';
                    tdTanggal.textContent = row.tanggal;

                    const tdHari = document.createElement('td');
                    tdHari.className = 'col-hari';
                    tdHari.textContent = row.hari;

                    const tdIg = document.createElement('td');
                    const igInput = document.createElement('textarea');
                    igInput.className = 'cell-editable';
                    igInput.rows = 1;
                    igInput.value = row.instagram;
                    igInput.dataset.field = 'instagram';
                    igInput.dataset.index = index;
                    tdIg.appendChild(igInput);

                    const tdTiktok = document.createElement('td');
                    const ttInput = document.createElement('textarea');
                    ttInput.className = 'cell-editable';
                    ttInput.rows = 1;
                    ttInput.value = row.tiktok;
                    ttInput.dataset.field = 'tiktok';
                    ttInput.dataset.index = index;
                    tdTiktok.appendChild(ttInput);

                    const tdShorts = document.createElement('td');
                    const shortsInput = document.createElement('textarea');
                    shortsInput.className = 'cell-editable';
                    shortsInput.rows = 1;
                    shortsInput.value = row.shorts;
                    shortsInput.dataset.field = 'shorts';
                    shortsInput.dataset.index = index;
                    tdShorts.appendChild(shortsInput);

                    tr.appendChild(tdTanggal);
                    tr.appendChild(tdHari);
                    tr.appendChild(tdIg);
                    tr.appendChild(tdTiktok);
                    tr.appendChild(tdShorts);
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.cell-editable').forEach(ta => {
                    autoResize(ta);
                    ta.addEventListener('input', function() {
                        autoResize(this);
                    });
                });

                const style = document.createElement('style');
                style.textContent = `
                    @keyframes rowFadeIn {
                        from { opacity: 0; transform: translateY(10px) scale(0.98); }
                        to { opacity: 1; transform: translateY(0) scale(1); }
                    }
                `;
                document.head.appendChild(style);
            }

            function autoResize(el) {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            }

            // ---------- GET DATA ----------
            function getTableData() {
                const rows = tbody.querySelectorAll('tr');
                const data = [];
                rows.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    const tanggal = tds[0]?.textContent.trim() || '';
                    const hari = tds[1]?.textContent.trim() || '';
                    const ig = tds[2]?.querySelector('textarea')?.value || '';
                    const tiktok = tds[3]?.querySelector('textarea')?.value || '';
                    const shorts = tds[4]?.querySelector('textarea')?.value || '';
                    data.push({ tanggal, hari, instagram: ig, tiktok, shorts });
                });
                return data;
            }

            // ---------- TOAST ----------
            function showToast(msg = '✅ Berhasil disimpan!') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            // ---------- SAVE ----------
            document.getElementById('saveBtn').addEventListener('click', function() {
                const data = getTableData();
                try {
                    localStorage.setItem('pawonScheduleData', JSON.stringify(data));
                    showToast('📋 Jadwal berhasil disimpan!');
                } catch(e) {
                    showToast('⚠️ Gagal menyimpan data');
                }
            });

            // ================================================================
            // ============= EXPORT PDF (TIDAK TERPOTONG) =====================
            // ================================================================
            document.getElementById('exportPdfBtn').addEventListener('click', function() {
                const data = getTableData();

                const now = new Date();
                const dateStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

                let tableRows = '';
                data.forEach(row => {
                    tableRows += `
                        <tr>
                            <td class="pdf-tgl">${row.tanggal}</td>
                            <td class="pdf-hari">${row.hari}</td>
                            <td class="col-ig">${row.instagram}</td>
                            <td class="col-tt">${row.tiktok}</td>
                            <td class="col-yt">${row.shorts}</td>
                        </tr>
                    `;
                });

                const pdfHTML = `
                    <div class="pdf-container">
                        <!-- HEADER -->
                        <div class="pdf-header">
                            <div>
                                <h1>Pawon Mbah Gito</h1>
                                <div class="pdf-sub"><i class="fas fa-calendar-alt" style="margin-right:6px;"></i>Jadwal Konten · Divisi Konten</div>
                            </div>
                            <div class="pdf-date">
                                <i class="fas fa-calendar-check"></i> ${dateStr}
                            </div>
                        </div>

                        <!-- TABLE -->
                        <table class="pdf-table">
                            <thead>
                                <tr>
                                    <th style="width:8%;">Tgl</th>
                                    <th style="width:12%;">Hari</th>
                                    <th style="width:28%;">Instagram (Feed/Reels)</th>
                                    <th style="width:32%;">TikTok (Harian)</th>
                                    <th style="width:20%;">YouTube Shorts</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>

                        <!-- FOOTER -->
                        <div class="pdf-footer">
                            <div class="pdf-brand">
                                <i class="fas fa-utensils"></i> Pawon Mbah Gito
                            </div>
                            <div>
                                <i class="fas fa-tag" style="margin-right:4px; color:#9d7053;"></i> #PawonMbahGito
                            </div>
                            <div class="pdf-page">
                                <i class="fas fa-print"></i> Divisi Konten
                            </div>
                        </div>
                    </div>
                `;

                // Buat elemen sementara dengan ukuran lebar yang cukup
                const container = document.createElement('div');
                container.innerHTML = pdfHTML;
                container.style.position = 'absolute';
                container.style.left = '-9999px';
                container.style.top = '0';
                container.style.width = '1300px';
                container.style.background = 'white';
                container.style.padding = '10px';
                container.style.boxSizing = 'border-box';
                document.body.appendChild(container);

                const pdfElement = container.querySelector('.pdf-container');

                const opt = {
                    margin:        [0.2, 0.2, 0.2, 0.2],
                    filename:      'Pawon_Mbah_Gito_Schedule.pdf',
                    image:         { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { 
                        scale: 2.8, 
                        letterRendering: true, 
                        useCORS: true, 
                        logging: false,
                        width: 1300,
                        height: pdfElement.scrollHeight + 50,
                    },
                    jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' }
                };

                showToast('⏳ Menyiapkan PDF...');

                html2pdf().set(opt).from(pdfElement).save().then(() => {
                    document.body.removeChild(container);
                    showToast('📄 PDF berhasil diekspor!');
                }).catch((err) => {
                    console.error(err);
                    document.body.removeChild(container);
                    showToast('⚠️ Gagal ekspor PDF, coba lagi.');
                });
            });

            // ---------- INIT ----------
            let storedData = null;
            try {
                const raw = localStorage.getItem('pawonScheduleData');
                if (raw) storedData = JSON.parse(raw);
            } catch(e) {}
            const startData = (storedData && storedData.length === initialData.length) ? storedData : initialData;
            renderTable(startData);
        })();
    </script>

</body>
</html>
